<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🤍𐙚 おみくじ 𐙚🤍</title>

<style>
body{
    font-family: "Hiragino Maru Gothic ProN", sans-serif;
    text-align:center;
    padding:20px;
    color:#5f6c7b;

    background:
        radial-gradient(#fff4b8 10%, transparent 11%),
        radial-gradient(#fff4b8 10%, transparent 11%);
    background-color:#dff4ff;
    background-size:40px 40px;
    background-position:0 0,20px 20px;
}

h1{
    color:#7dbde8;
    font-size:42px;
    margin-bottom:25px;
}

.box{
    width:240px;
    height:280px;
    margin:30px auto;

    background:white;

    border-radius:50px;

    border:8px solid #ffffff;

    box-shadow:
        0 0 0 10px #eaf8ff,
        0 0 0 20px #ffffff,
        0 10px 25px rgba(0,0,0,.08);

    display:flex;
    align-items:center;
    justify-content:center;

    font-size:90px;
}

button{
    padding:16px 45px;
    font-size:20px;
    font-weight:bold;

    background:white;
    color:#7dbde8;

    border:4px solid #bfe7ff;

    border-radius:999px;

    cursor:pointer;

    transition:0.2s;
}

button:hover{
    transform:translateY(-3px);
}

.result{
    max-width:550px;
    margin:35px auto;

    background:white;

    padding:35px;

    border-radius:35px;

    min-height:180px;

    position:relative;

    box-shadow:0 8px 20px rgba(0,0,0,.08);
}

.result::before{
    content:"🎀 🎀 🎀";
    position:absolute;
    top:-18px;
    left:50%;
    transform:translateX(-50%);
    font-size:28px;
}

.result::after{
    content:"🎀 🎀 🎀";
    position:absolute;
    bottom:-18px;
    left:50%;
    transform:translateX(-50%);
    font-size:28px;
}

.rank{
    font-size:40px;
    font-weight:bold;
    margin-bottom:15px;
}
</style>
</head>

<body>

<h1>🤍𐙚 おみくじ 𐙚🤍</h1>

<div class="box">🐻‍❄️</div>

<button onclick="drawOmikuji()">✨おみくじを引く✨</button>

<div class="result" id="result">
    今日の運勢はどうかな？🩵
</div>

<script>
const fortunes = [
{
rank:"大吉",
text:"逆になんか不安になってくるくらいめっちゃいい日になりますよ😉",
color:"#ff7eb6"
},
{
rank:"吉",
text:"無意識にも安定を求めてるんじゃないですか？",
color:"#7dbde8"
},
{
rank:"中吉",
text:"大吉の次が中吉やと思ってたけど残念！違うらしいよ🥲",
color:"#a78bfa"
},
{
rank:"小吉",
text:"私の今年のおみくじよりも上やで👍",
color:"#6fcf97"
},
{
rank:"末吉",
text:"私も末吉やったけど今のところ困ってないからきっと大丈夫☺️",
color:"#f2c94c"
},
{
rank:"凶",
text:"大丈夫！横に倒したら区やから！倒せ倒せ！",
color:"#95a5a6"
}
];

function drawOmikuji(){

const resultDiv = document.getElementById("result");

const random =
fortunes[Math.floor(Math.random()*fortunes.length)];

resultDiv.innerHTML = `
<div class="rank" style="color:${random.color}">
${random.rank}
</div>

<div style="
font-size:20px;
line-height:1.8;">
${random.text}
</div>
`;
}
</script>

</body>
</html>
